gitlab:
  enabled: true
  config: /Users/josyork/.config/glab-cli/config.yml # glab-cli config file to update
forge:
  enabled: false # Login to Forge AI platform. Outputs FORGE_TOKEN env var.
  dev: false # Target the dev Forge deployment instead of production. Can also be set with --dev flag.
